<!DOCTYPE html>
<html>
<head>
    <title>Care Plan Generator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #222; }
        h1 { color: #0066cc; }
        label { display: block; margin: 12px 0 4px; font-weight: 500; font-size: 14px; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        textarea { min-height: 80px; font-family: inherit; }
        button { margin-top: 24px; padding: 12px 24px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0052a3; }
        button:disabled { background: #999; cursor: wait; }
        .row { display: flex; gap: 12px; }
        .row > div { flex: 1; }
        .hint { color: #666; font-size: 13px; margin-top: 12px; }
    </style>
</head>
<body>
    <h1>Care Plan Generator</h1>
    <form method="post" action="/submit/" onsubmit="document.getElementById('btn').disabled=true; document.getElementById('btn').innerText='Generating... (10-30s)';">

        <div class="row">
            <div>
                <label>Patient First Name</label>
                <input name="patient_first_name" required>
            </div>
            <div>
                <label>Patient Last Name</label>
                <input name="patient_last_name" required>
            </div>
        </div>

        <div class="row">
            <div>
                <label>MRN (6 digits)</label>
                <input name="patient_mrn" required>
            </div>
            <div>
                <label>Date of Birth</label>
                <input name="patient_dob" type="date" required>
            </div>
        </div>

        <label>Primary Diagnosis (ICD-10)</label>
        <input name="primary_diagnosis" required>

        <label>Additional Diagnoses (comma-separated)</label>
        <input name="additional_diagnoses">

        <label>Medication Name</label>
        <input name="medication_name" required>

        <label>Medication History</label>
        <textarea name="medication_history"></textarea>

        <label>Patient Records / Notes</label>
        <textarea name="patient_records"></textarea>

        <div class="row">
            <div>
                <label>Provider Name</label>
                <input name="provider_name" required>
            </div>
            <div>
                <label>Provider NPI (10 digits)</label>
                <input name="provider_npi" required>
            </div>
        </div>

        <button id="btn" type="submit">Generate Care Plan</button>
        <p class="hint">⏱️ LLM generation is synchronous — the page will hang for 10-30 seconds while we wait.</p>
    </form>
</body>
</html>
